<svg viewBox="0 0 300 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="goldenGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="300" height="380" fill="#0d0d0d"/>

  <!-- Decorative symbol - moon and star -->
  <g transform="translate(150, 65)">
    <!-- Crescent moon - left side -->
    <path d="M -10 0 Q -15 3 -10 6 Q -7 3 -10 0" fill="#c9a961" opacity="0.95"/>
    <!-- Star - right side -->
    <g transform="translate(16, 0)">
      <path d="M 0 -4 L 1.2 -1.5 L 4 -1.5 L 1.8 0.5 L 2.5 3.5 L 0 1.5 L -2.5 3.5 L -1.8 0.5 L -4 -1.5 L -1.2 -1.5 Z" fill="#c9a961" opacity="0.95"/>
    </g>
  </g>

  <!-- Main text: Liora in flowing elegant calligraphy -->
  <text x="150" y="165" font-family="cursive" font-size="96" font-weight="300" font-style="italic" text-anchor="middle" fill="#c9a961" filter="url(#goldenGlow)" letter-spacing="3">
    Liora
  </text>

  <!-- Decorative line flourish -->
  <path d="M 50 185 Q 150 192 250 185" stroke="#c9a961" stroke-width="1.2" fill="none" opacity="0.7"/>

  <!-- Secondary text: JEWELRY -->
  <text x="150" y="240" font-family="serif" font-size="13" font-weight="400" letter-spacing="5" text-anchor="middle" fill="#c9a961" opacity="0.85" font-variant="small-caps">
    JEWELRY
  </text>

  <!-- Bottom decorative flourish -->
  <path d="M 80 260 Q 150 270 220 260" stroke="#c9a961" stroke-width="1" fill="none" opacity="0.5"/>
</svg>